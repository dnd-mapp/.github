name: Story
description: A user-facing unit of work that delivers a single slice of value to a specific persona.
type: Story
body:
    - type: textarea
      id: user-story
      attributes:
          label: User Story
          description: "Describe the feature from the user's perspective."
          placeholder: "As a [persona], I want [goal], so that [reason]."
      validations:
          required: true

    - type: textarea
      id: acceptance-criteria
      attributes:
          label: Acceptance Criteria
          description: Concrete, observable conditions that must be true for this Story to be considered done.
          placeholder: |
              - [ ]
              - [ ]
      validations:
          required: true

    - type: textarea
      id: references
      attributes:
          label: References
          description: Links to Figma, docs, related issues, or other relevant resources.
      validations:
          required: false
