name: Bug
description: A defect or unintended behaviour in the application.
type: Bug
body:
    - type: textarea
      id: steps-to-reproduce
      attributes:
          label: Steps to Reproduce
          description: The exact steps needed to trigger the bug.
          placeholder: |
              1.
              2.
              3.
      validations:
          required: true

    - type: textarea
      id: expected-behavior
      attributes:
          label: Expected Behavior
          description: What should happen?
      validations:
          required: true

    - type: textarea
      id: actual-behavior
      attributes:
          label: Actual Behavior
          description: What actually happens?
      validations:
          required: true

    - type: input
      id: environment
      attributes:
          label: Environment / Version
          description: "Platform, browser, OS, or app version where the bug was observed."
          placeholder: "e.g. Chrome 124, Windows 11, v2.3.1"
      validations:
          required: true

    - type: dropdown
      id: severity
      attributes:
          label: Severity
          description: How bad is the impact?
          options:
              - S0 — Critical (data loss, corruption, or complete feature failure with no workaround)
              - S1 — High (core flow broken, workaround exists but is painful)
              - S2 — Medium (degraded experience, reasonable workaround available)
              - S3 — Low (cosmetic or minor, does not impact functionality)
      validations:
          required: false

    - type: textarea
      id: logs-screenshots
      attributes:
          label: Logs / Screenshots
          description: Paste relevant error output, console logs, or attach screenshots.
      validations:
          required: false

    - type: textarea
      id: references
      attributes:
          label: References
          description: Links to related issues, PRs, docs, or other relevant resources.
      validations:
          required: false
