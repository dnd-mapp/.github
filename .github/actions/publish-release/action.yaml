name: Publish release
description: Creates a signed annotated tag and GitHub Release, and merges the release branch into main for stable releases

inputs:
    app-id:
        description: The GitHub App ID for authentication
        required: true
    app-private-key:
        description: The GitHub App private key for authentication
        required: true

runs:
    using: composite
    steps:
        - name: Configure git bot
          id: git-bot
          uses: dnd-mapp/.github/.github/actions/configure-git-bot@4b623e52868311b7371d0c064b3315367aa0a6b5
          with:
              app-id: ${{ inputs.app-id }}
              app-private-key: ${{ inputs.app-private-key }}

        - name: Publish release
          id: publish-release
          shell: bash
          working-directory: ${{ github.action_path }}
          env:
              GH_TOKEN: ${{ steps.git-bot.outputs.token }}
              CHANGELOG_PATH: ${{ github.workspace }}/CHANGELOG.md
          run: node dist/publish-release.mjs

        - name: Merge release branch
          if: startsWith(github.ref_name, 'release/') && steps.publish-release.outputs.is-prerelease == 'false'
          shell: bash
          working-directory: ${{ github.action_path }}
          env:
              GH_TOKEN: ${{ steps.git-bot.outputs.token }}
              RELEASE_BRANCH: ${{ github.ref_name }}
          run: node dist/merge-release-branch.mjs
