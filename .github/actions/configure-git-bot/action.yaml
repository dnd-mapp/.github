name: Configure git bot
description: Generates a GitHub App token, resolves the bot user identity, and configures git

inputs:
    app-id:
        description: The GitHub App ID for authentication
        required: true
    app-private-key:
        description: The GitHub App private key for authentication
        required: true

outputs:
    token:
        description: The generated GitHub App installation token
        value: ${{ steps.app-token.outputs.token }}

runs:
    using: composite
    steps:
        - name: Generate app token
          id: app-token
          uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
          with:
              app-id: ${{ inputs.app-id }}
              private-key: ${{ inputs.app-private-key }}

        - name: Get bot user info
          id: bot-user
          shell: bash
          env:
              GH_TOKEN: ${{ steps.app-token.outputs.token }}
          run: |
              USER_ID=$(gh api /users/${{ steps.app-token.outputs.app-slug }}[bot] --jq '.id')
              echo "name=${{ steps.app-token.outputs.app-slug }}[bot]" >> "$GITHUB_OUTPUT"
              echo "email=${USER_ID}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

        - name: Configure git
          shell: bash
          run: |
              git config user.name "${{ steps.bot-user.outputs.name }}"
              git config user.email "${{ steps.bot-user.outputs.email }}"
