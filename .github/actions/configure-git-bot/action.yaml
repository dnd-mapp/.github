name: Configure git bot
description: Generates a GitHub App token, resolves the bot user identity, and configures git

inputs:
    app-id:
        description: The GitHub App ID for authentication
        required: true
    app-private-key:
        description: The GitHub App private key for authentication
        required: true
    repositories:
        description: Newline-separated list of owner/repo to scope the token to
        required: false
        default: ''

outputs:
    token:
        description: The generated GitHub App installation token
        value: ${{ steps.app-token.outputs.token }}
    name:
        description: The bot user's display name (e.g. my-app[bot])
        value: ${{ steps.bot-user.outputs.name }}
    email:
        description: The bot user's noreply email address
        value: ${{ steps.bot-user.outputs.email }}

runs:
    using: composite
    steps:
        - name: Resolve repository names
          id: repo-names
          shell: bash
          env:
              REPOSITORIES: ${{ inputs.repositories }}
          run: |
              names=$(echo "$REPOSITORIES" | grep -v '^\s*$' | sed 's|[^/]*/||g' | paste -sd ',' -)
              echo "names=$names" >> "$GITHUB_OUTPUT"

        - name: Generate app token
          id: app-token
          uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
          with:
              app-id: ${{ inputs.app-id }}
              private-key: ${{ inputs.app-private-key }}
              repositories: ${{ steps.repo-names.outputs.names }}

        - name: Get bot user info
          id: bot-user
          shell: bash
          env:
              GH_TOKEN: ${{ steps.app-token.outputs.token }}
              APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          run: |
              USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq '.id')
              echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
              echo "email=${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

        - name: Configure git
          shell: bash
          env:
              BOT_NAME: ${{ steps.bot-user.outputs.name }}
              BOT_EMAIL: ${{ steps.bot-user.outputs.email }}
          run: |
              git config user.name "$BOT_NAME"
              git config user.email "$BOT_EMAIL"
