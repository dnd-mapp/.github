name: Update changelog
description: Prepares release notes from the [Unreleased] section and commits the updated CHANGELOG.md

inputs:
    token:
        description: The GitHub token used to commit the changelog update
        required: true
    clean-version:
        description: The new version without 'v' prefix (e.g. 1.2.3)
        required: true
    branch:
        description: The branch to commit the changelog update to
        default: ${{ github.ref_name }}

runs:
    using: composite
    steps:
        - name: Prepare release notes
          shell: bash
          env:
              CLEAN_VERSION: ${{ inputs.clean-version }}
              ACTION_PATH: ${{ github.action_path }}
          run: node "$ACTION_PATH/scripts/prepare-release-notes.mjs"

        - name: Update changelog
          shell: bash
          env:
              GH_TOKEN: ${{ inputs.token }}
              REPO: ${{ github.repository }}
              BRANCH: ${{ inputs.branch }}
              CLEAN_VERSION: ${{ inputs.clean-version }}
          run: |
              CHANGELOG_PATH="CHANGELOG.md"
              COMMIT_MESSAGE="Chore: Update changelog for $CLEAN_VERSION"

              CURRENT_SHA=$(gh api "repos/$REPO/contents/$CHANGELOG_PATH" \
                  --jq '.sha' -H "Accept: application/vnd.github.v3+json")

              gh api "repos/$REPO/contents/$CHANGELOG_PATH" --method PUT \
                  -f message="$COMMIT_MESSAGE" \
                  -f content="$(base64 -w0 "$CHANGELOG_PATH")" \
                  -f sha="$CURRENT_SHA" -f branch="$BRANCH" \
                  --jq '.commit.sha'
