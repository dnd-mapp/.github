name: Update changelog
description: Prepares release notes from the [Unreleased] section and commits the updated CHANGELOG.md

inputs:
    token:
        description: The GitHub token used to commit the changelog update
        required: true
    clean-version:
        description: The new version without 'v' prefix (e.g. 1.2.3)
        required: true

runs:
    using: composite
    steps:
        - name: Prepare release notes
          shell: bash
          env:
              CLEAN_VERSION: ${{ inputs.clean-version }}
          run: node ${{ github.action_path }}/scripts/prepare-release-notes.mjs

        - name: Update changelog
          shell: bash
          env:
              GH_TOKEN: ${{ inputs.token }}
          run: |
              REPO="${{ github.repository }}"
              BRANCH="${{ github.ref_name }}"
              CHANGELOG_PATH="CHANGELOG.md"
              COMMIT_MESSAGE="Chore: Update changelog for ${{ inputs.clean-version }}"

              CURRENT_SHA=$(gh api "repos/$REPO/contents/$CHANGELOG_PATH" \
                  --jq '.sha' -H "Accept: application/vnd.github.v3+json")

              gh api "repos/$REPO/contents/$CHANGELOG_PATH" --method PUT -f message="$COMMIT_MESSAGE" \
                  -f content="$(base64 -w0 "$CHANGELOG_PATH")" -f sha="$CURRENT_SHA" -f branch="$BRANCH" \
              --jq '.commit.sha'
