name: Bump version
description: Validates release inputs, bumps the package version, and creates a GitHub release

inputs:
    app-id:
        description: The GitHub App ID for authentication
        required: true
    app-private-key:
        description: The GitHub App private key for authentication
        required: true
    version:
        description: The version bump type (major, minor, patch, premajor, preminor, prepatch, prerelease)
        required: true
    prerelease-id:
        description: The prerelease identifier (alpha, beta, rc, none)
        default: none

outputs:
    raw-version:
        description: The new version with 'v' prefix (e.g. v1.2.3)
        value: ${{ steps.bump-version.outputs.raw-version }}
    clean-version:
        description: The new version without 'v' prefix (e.g. 1.2.3)
        value: ${{ steps.bump-version.outputs.clean-version }}

runs:
    using: composite
    steps:
        - name: Validate branch
          id: validate-branch
          shell: bash
          env:
              GITHUB_TOKEN: ${{ github.token }}
              VERSION: ${{ inputs.version }}
              PRERELEASE_ID: ${{ inputs.prerelease-id }}
              ACTION_PATH: ${{ github.action_path }}
          run: node "$ACTION_PATH/scripts/validate-branch.mts"

        - name: Configure git bot
          id: git-bot
          uses: dnd-mapp/.github/.github/actions/configure-git-bot@6897b02ea4fdb4d4b51a40043592087effe8cc3d
          with:
              app-id: ${{ inputs.app-id }}
              app-private-key: ${{ inputs.app-private-key }}

        - name: Bump version
          id: bump-version
          shell: bash
          env:
              VERSION: ${{ inputs.version }}
              PRERELEASE_ID: ${{ inputs.prerelease-id }}
              ACTION_PATH: ${{ github.action_path }}
          run: node "$ACTION_PATH/scripts/bump-version.mts"

        - name: Create release branch
          id: create-release-branch
          if: steps.bump-version.outputs.release-branch-name != ''
          shell: bash
          env:
              GH_TOKEN: ${{ steps.git-bot.outputs.token }}
              RELEASE_BRANCH_NAME: ${{ steps.bump-version.outputs.release-branch-name }}
              ACTION_PATH: ${{ github.action_path }}
          run: node "$ACTION_PATH/scripts/create-release-branch.mts"

        - name: Update changelog
          uses: dnd-mapp/.github/.github/actions/update-changelog@6897b02ea4fdb4d4b51a40043592087effe8cc3d
          with:
              token: ${{ steps.git-bot.outputs.token }}
              clean-version: ${{ steps.bump-version.outputs.clean-version }}
              is-prerelease: ${{ steps.bump-version.outputs.release-branch-name != '' }}
              branch: ${{ steps.bump-version.outputs.release-branch-name || github.ref_name }}

        - name: Update package manifest
          id: commit-manifest
          shell: bash
          env:
              GH_TOKEN: ${{ steps.git-bot.outputs.token }}
              REPO: ${{ github.repository }}
              BRANCH: ${{ steps.bump-version.outputs.release-branch-name || github.ref_name }}
              COMMIT_MESSAGE: ${{ steps.bump-version.outputs.clean-version }}
          run: |
              MANIFEST_PATH="package.json"

              FILE_SHA=$(gh api "repos/$REPO/contents/$MANIFEST_PATH" --jq '.sha')
              CONTENT=$(base64 -w0 "$MANIFEST_PATH")

              NEW_COMMIT_SHA=$(gh api "repos/$REPO/contents/$MANIFEST_PATH" --method PUT \
                  -f message="$COMMIT_MESSAGE" \
                  -f content="$CONTENT" -f sha="$FILE_SHA" -f branch="$BRANCH" \
                  --jq '.commit.sha')

              echo "commit-sha=$NEW_COMMIT_SHA" >> $GITHUB_OUTPUT
