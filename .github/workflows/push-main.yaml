name: Push to main
on:
    push:
        branches:
            - main
permissions:
    contents: read
jobs:
    ci:
        name: CI
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: CI
              uses: ./.github/actions/ci

    check-changes:
        name: Check changes
        runs-on: ubuntu-22.04
        outputs:
            should-update-self: ${{ steps.check.outputs.should-update-self }}
            should-update-siblings: ${{ steps.check.outputs.should-update-siblings }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 2

            - name: Detect changes
              id: check
              run: |
                  CHANGED=$(git diff --name-only HEAD^1 HEAD)
                  AUTHOR=$(git log -1 --format="%an")

                  HAS_DIST=$(echo "$CHANGED" | grep -qE '\.github/actions/.+/dist/' && echo true || echo false)
                  HAS_YAML=$(echo "$CHANGED" | grep -qE '\.github/(actions/.+|workflows/.+)\.yaml' && echo true || echo false)
                  IS_BOT=$(echo "$AUTHOR" | grep -qi '\[bot\]' && echo true || echo false)

                  if [ "$IS_BOT" = "false" ] && { [ "$HAS_DIST" = "true" ] || [ "$HAS_YAML" = "true" ]; }; then
                      echo "should-update-self=true" >> "$GITHUB_OUTPUT"
                      echo "should-update-siblings=false" >> "$GITHUB_OUTPUT"
                  elif [ "$IS_BOT" = "true" ] && [ "$HAS_YAML" = "true" ]; then
                      echo "should-update-self=false" >> "$GITHUB_OUTPUT"
                      echo "should-update-siblings=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "should-update-self=false" >> "$GITHUB_OUTPUT"
                      echo "should-update-siblings=false" >> "$GITHUB_OUTPUT"
                  fi

    propagate-sha:
        name: Propagate SHA
        runs-on: ubuntu-22.04
        needs: [ci, check-changes]
        if: needs.check-changes.outputs.should-update-self == 'true' || needs.check-changes.outputs.should-update-siblings == 'true'
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Configure git bot
              id: git-bot
              uses: ./.github/actions/configure-git-bot
              with:
                  app-id: ${{ secrets.AUTH_APP_ID }}
                  app-private-key: ${{ secrets.AUTH_APP_PRIVATE_KEY }}
                  repositories: |
                      dnd-mapp/dnd-mapp
                      dnd-mapp/auth-server
                      dnd-mapp/email-service
                      dnd-mapp/shared-backend
                      dnd-mapp/shared-domain
                      dnd-mapp/shared-ui
                      dnd-mapp/shared-utils
                      dnd-mapp/.github

            - name: Propagate SHA to self
              if: needs.check-changes.outputs.should-update-self == 'true'
              uses: ./.github/actions/propagate-sha
              with:
                  token: ${{ steps.git-bot.outputs.token }}
                  new-sha: ${{ github.sha }}
                  sibling-repos: dnd-mapp/.github

            - name: Propagate SHA to sibling repos
              if: needs.check-changes.outputs.should-update-siblings == 'true'
              uses: ./.github/actions/propagate-sha
              with:
                  token: ${{ steps.git-bot.outputs.token }}
                  new-sha: ${{ github.sha }}
                  sibling-repos: |
                      dnd-mapp/dnd-mapp
                      dnd-mapp/auth-server
                      dnd-mapp/email-service
                      dnd-mapp/shared-backend
                      dnd-mapp/shared-domain
                      dnd-mapp/shared-ui
                      dnd-mapp/shared-utils
